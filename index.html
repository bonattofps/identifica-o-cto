<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Operacional</title>

<style>
body {
  font-family: 'Segoe UI';
  background: #0b0f1a;
  color: #fff;
  margin:0;
}

.header {
  padding:20px;
  background: linear-gradient(135deg,#6C2BD9,#3B82F6);
  font-size:20px;
  text-align:center;
}

.container {
  padding:20px;
  max-width:1200px;
  margin:auto;
}

.card {
  background:#111827;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:6px;
}

button {
  width:100%;
  padding:12px;
  background:linear-gradient(135deg,#6C2BD9,#3B82F6);
  border:none;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:15px;
}

.item {
  background:#1f2937;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">🚀 Dashboard Operacional</div>

<div class="container">

<div class="card">
<h3>Novo Registro</h3>

<input id="titulo" placeholder="Título">
<textarea id="descricao" placeholder="Descrição"></textarea>
<input id="responsavel" placeholder="Responsável">
<input id="link" placeholder="Link da Evidência">

<button onclick="salvar()">Salvar</button>
</div>

<div class="card">
<h3>📎 Resumo de Anexos</h3>
<div id="resumo" class="grid"></div>
</div>

<div class="card">
<h3>📜 Histórico Completo</h3>
<div id="historico"></div>
</div>

</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz40yerzLcYsbRSwGD0RCzaQ8sv19KcItBrYJUKNIO2HxZlql9ZV2S5VVSlcexyav1t/exec";

// ===== SALVAR =====
async function salvar(){

  if(!titulo.value || !link.value){
    alert("Preencha Título e Link");
    return;
  }

  const url =
    SCRIPT_URL +
    "?acao=salvar" +
    "&titulo=" + encodeURIComponent(titulo.value) +
    "&descricao=" + encodeURIComponent(descricao.value) +
    "&responsavel=" + encodeURIComponent(responsavel.value) +
    "&link=" + encodeURIComponent(link.value);

  const res = await fetch(url);
  const json = await res.json();

  if(json.status === "sucesso"){
    alert("Salvo com sucesso");
    limpar();
    carregar();
  } else {
    alert("Erro ao salvar");
  }
}

// ===== CARREGAR =====
async function carregar(){

  const res = await fetch(SCRIPT_URL);
  const data = await res.json();

  const resumo = document.getElementById("resumo");
  const historico = document.getElementById("historico");

  resumo.innerHTML = "";
  historico.innerHTML = "";

  data.reverse().forEach(r => {

    resumo.innerHTML += `
      <div class="item">
        <b>${r[1]}</b><br>
        <a href="${r[4]}" target="_blank">🔗 Abrir Evidência</a>
      </div>
    `;

    historico.innerHTML += `
      <div class="item">
        <b>${r[1]}</b><br>
        ${r[2]}<br>
        👤 ${r[3]}<br>
        <a href="${r[4]}" target="_blank">Abrir Evidência</a><br>
        <small>${r[0]}</small>
      </div>
    `;
  });
}

// ===== LIMPAR =====
function limpar(){
  titulo.value="";
  descricao.value="";
  responsavel.value="";
  link.value="";
}

carregar();

</script>

</body>
</html>
