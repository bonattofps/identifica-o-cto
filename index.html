<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Técnico CTO</title>

<style>
body {
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0;
  border:none;
  border-radius:5px;
}

button {
  padding:12px;
  width:100%;
  background:#3b82f6;
  color:#fff;
  border:none;
  cursor:pointer;
  border-radius:5px;
}

table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

td, th {
  padding:10px;
  border-bottom:1px solid #333;
}
</style>
</head>

<body>

<h2>Cadastro Técnico</h2>

<input id="olt" placeholder="OLT">
<input id="pon" placeholder="PON">
<input id="tecnico" placeholder="Técnico">
<input id="suporte" placeholder="Suporte">
<textarea id="obs" placeholder="Observações"></textarea>
<input id="linkFoto" placeholder="Link da Foto">

<button onclick="salvar()">Salvar</button>

<h2>Registros</h2>

<table>
<thead>
<tr>
<th>Data</th>
<th>OLT</th>
<th>PON</th>
<th>Técnico</th>
<th>Suporte</th>
<th>Obs</th>
<th>Foto</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>

const SCRIPT_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AWDtjMVmNGd-MuBDAoZTEuKwUVQhsz6WSqcZ4Wy51BG8sDLwVlROByKriceDewuJe9LaRMEZUJlJFZ1zEUUvfhR6Li_gScXDoj0fT_oLKT9AIT-MhODmw9NSjuFBYZl2jrR7FDybSGiTYvbY0Xtqb_e7Lcr0gJ0JIJCYzWeCKvxvgz78W1QKu9z0_7gx45KS9dHAgKvNBMkG0F4Ia0TIumsx63Mn4fcc2mc1dIyT-J7fcJyjvszLdWATrnmIafmc9bjV3Hbx634I7p1nWs5IiozCj6gzyRFN0jnQiB-QLxHJNkyACQ2bhTXvmZpCjnh50kO9xUH6i7QhtI4fYLkEf3vYTKzdXijT5g&lib=MSKy4fl67DCgd6EkwiVelBpb4RTOWMz5B";

// ================= SALVAR =================
async function salvar() {

  const dados = {
    olt: document.getElementById("olt").value,
    pon: document.getElementById("pon").value,
    tecnico: document.getElementById("tecnico").value,
    suporte: document.getElementById("suporte").value,
    obs: document.getElementById("obs").value,
    linkFoto: document.getElementById("linkFoto").value
  };

  if (!dados.olt || !dados.tecnico || !dados.linkFoto) {
    alert("Preencha OLT, Técnico e Link da Foto");
    return;
  }

  try {

    const url =
      SCRIPT_URL +
      "?acao=salvar" +
      "&olt=" + encodeURIComponent(dados.olt) +
      "&pon=" + encodeURIComponent(dados.pon) +
      "&tecnico=" + encodeURIComponent(dados.tecnico) +
      "&suporte=" + encodeURIComponent(dados.suporte) +
      "&obs=" + encodeURIComponent(dados.obs) +
      "&linkFoto=" + encodeURIComponent(dados.linkFoto);

    await fetch(url);

    alert("✅ Salvo com sucesso");

    limparCampos();
    carregarHistorico();

  } catch (e) {
    alert("❌ Erro: " + e.message);
  }
}

// ================= CARREGAR =================
async function carregarHistorico() {

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "<tr><td colspan='7'>Carregando...</td></tr>";

  try {

    const response = await fetch(SCRIPT_URL);
    const dados = await response.json();

    tabela.innerHTML = "";

    dados.reverse().forEach(reg => {
      tabela.innerHTML += `
        <tr>
          <td>${reg[0]}</td>
          <td>${reg[1]}</td>
          <td>${reg[2]}</td>
          <td>${reg[3]}</td>
          <td>${reg[4]}</td>
          <td>${reg[5]}</td>
          <td><a href="${reg[6]}" target="_blank">Abrir</a></td>
        </tr>
      `;
    });

  } catch (erro) {
    tabela.innerHTML = "<tr><td colspan='7'>Erro ao carregar</td></tr>";
  }
}

// ================= LIMPAR =================
function limparCampos() {
  document.getElementById("olt").value = "";
  document.getElementById("pon").value = "";
  document.getElementById("tecnico").value = "";
  document.getElementById("suporte").value = "";
  document.getElementById("obs").value = "";
  document.getElementById("linkFoto").value = "";
}

// ================= INIT =================
carregarHistorico();

</script>

</body>
</html>
