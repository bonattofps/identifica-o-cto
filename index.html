<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Identificação de CTO</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="main">

<h1>🚀 Identificação de CTO</h1>

<!-- CARDS -->
<div class="cards">
  <div class="card"><h2 id="total">0</h2><p>Total Registros</p></div>
  <div class="card"><h2 id="olts">0</h2><p>OLTs</p></div>
  <div class="card"><h2 id="tecnicos">0</h2><p>Técnicos</p></div>
</div>

<!-- FORM -->
<div class="form-card">

<h2>📥 Cadastro</h2>

<div class="grid">
<input id="olt" placeholder="OLT">
<input id="pon" placeholder="SLOT/PON">
<input id="tecnico" placeholder="Técnico de Campo">
<input id="suporte" placeholder="Suporte Responsável">
</div>

<textarea id="obs" placeholder="Observações Técnicas"></textarea>
<input id="link" placeholder="Link da Evidência">

<button onclick="salvar()">Salvar Registro</button>

</div>

<!-- HISTÓRICO -->
<div class="form-card">

<h2>📊 Histórico</h2>

<input class="search" placeholder="Buscar..." oninput="buscar(this.value)">

<table>
<thead>
<tr>
<th>Data</th>
<th>OLT</th>
<th>PON</th>
<th>Técnico</th>
<th>Suporte</th>
<th>Obs</th>
<th>Evidência</th>
</tr>
</thead>

<tbody id="tabela"></tbody>
</table>

<!-- PAGINAÇÃO -->
<div class="paginacao">
<button onclick="anterior()">⬅</button>
<span id="paginaInfo"></span>
<button onclick="proxima()">➡</button>
</div>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
