<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel CTO</title>

<style>
body { font-family: Arial; background:#0f172a; color:#fff; padding:20px; }
input, textarea { width:100%; padding:10px; margin:5px 0; }
button { padding:12px; width:100%; background:#3b82f6; color:#fff; border:none; cursor:pointer; }
table { width:100%; margin-top:20px; border-collapse:collapse; }
td, th { padding:10px; border-bottom:1px solid #333; }
</style>
</head>

<body>

<h2>Cadastro Técnico</h2>

<input id="olt" placeholder="OLT">
<input id="pon" placeholder="PON">
<input id="tecnico" placeholder="Técnico">
<input id="suporte" placeholder="Suporte">
<textarea id="obs" placeholder="Observações"></textarea>
<input id="linkFoto" placeholder="Link da Foto">

<button onclick="salvar()">Salvar</button>

<h2>Registros</h2>

<table>
<thead>
<tr>
<th>Data</th><th>OLT</th><th>PON</th><th>Técnico</th><th>Suporte</th><th>Obs</th><th>Foto</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_yzrcMCaMQfdycUJcD6RKLdFthcTXuCrXzWHCLTg__VaVP4tpdnH7o2ux65Gjst2zWw/exec";

// ================= SALVAR =================
async function salvar() {

  const dados = {
    data: new Date().toLocaleString("pt-BR"),
    olt: olt.value,
    pon: pon.value,
    tecnico: tecnico.value,
    suporte: suporte.value,
    obs: obs.value,
    linkFoto: linkFoto.value
  };

  if (!dados.olt || !dados.tecnico || !dados.linkFoto) {
    alert("Preencha os campos obrigatórios");
    return;
  }

  try {

    // 🔥 FORMDATA (resolve CORS)
    const formData = new FormData();
    formData.append("data", JSON.stringify(dados));

    await fetch(SCRIPT_URL, {
      method: "POST",
      body: formData
    });

    alert("✅ Salvo com sucesso");

    limpar();
    carregar();

  } catch (e) {
    alert("❌ Erro: " + e.message);
  }
}

// ================= CARREGAR =================
async function carregar() {

  try {
    const res = await fetch(SCRIPT_URL);
    const data = await res.json();

    const tabela = document.getElementById("tabela");
    tabela.innerHTML = "";

    data.reverse().forEach(r => {
      tabela.innerHTML += `
        <tr>
          <td>${r[0]}</td>
          <td>${r[1]}</td>
          <td>${r[2]}</td>
          <td>${r[3]}</td>
          <td>${r[4]}</td>
          <td>${r[5]}</td>
          <td><a href="${r[6]}" target="_blank">Abrir</a></td>
        </tr>
      `;
    });

  } catch (e) {
    console.error(e);
  }
}

// ================= LIMPAR =================
function limpar() {
  olt.value = "";
  pon.value = "";
  tecnico.value = "";
  suporte.value = "";
  obs.value = "";
  linkFoto.value = "";
}

carregar();

</script>

</body>
</html>
